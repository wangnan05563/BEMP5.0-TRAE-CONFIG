# BEMP Git Maven 自动化构建配置
# 修改此文件后重新调用技能即可生效，无需重启IDE
# 环境变量可覆盖同名配置项

# ======== 常用配置（按需修改） ========

# 构建类型：full=全量构建 / incremental=增量构建
BUILD_TYPE=incremental

# Banks个性化工程构建目录（逗号分隔，为空则构建所有）
# 河南农信：ext-hnnxbank | 示例多银行：ext-hnnxbank,ext-sample
BANKS_BUILD_DIRS=ext-hnnxbank

# 是否自动构建依赖模块：true / false
BANKS_BUILD_DEPENDENCIES=true

# Maven内存参数（构建内存不足时可调大）
MAVEN_OPTS=-Xmx2048m -XX:MaxPermSize=512m

# ======== 高级配置（一般无需修改） ========

# 跳过的目录（逗号分隔）
SKIP_DIRS=node_modules,target,.idea,log,logs

# 冲突处理方式：stop=停止 / warn=警告继续 / skip=跳过
CONFLICT_ACTION=stop

# 并行构建：true / false
PARALLEL_BUILD=false

# 并行线程数
BUILD_THREADS=4

# Git重试次数
GIT_RETRY_COUNT=3

# 生成构建报告：true / false
ENABLE_BUILD_REPORT=true
