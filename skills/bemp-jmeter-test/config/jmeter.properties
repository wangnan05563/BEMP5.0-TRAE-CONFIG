# JMeter CSV Output Configuration
# This file configures JMeter to output results in CSV format for HTML report generation

# CSV Output Format (required for HTML report generation)
jmeter.save.saveservice.output_format=csv

# Enable all fields for detailed analysis
jmeter.save.saveservice.response_data=false
jmeter.save.saveservice.samplerData=false
jmeter.save.saveservice.assertions=true
jmeter.save.saveservice.timestamp_format=ms
jmeter.save.saveservice.print_field_names=true

# Fields to save
jmeter.save.saveservice.responseHeader=true
jmeter.save.saveservice.requestHeader=true
jmeter.save.saveservice.url=true
jmeter.save.saveservice.responseCode=true
jmeter.save.saveservice.responseMessage=true
jmeter.save.saveservice.successful=true
jmeter.save.saveservice.label=true
jmeter.save.saveservice.time=true
jmeter.save.saveservice.latency=true
jmeter.save.saveservice.connect_time=true
jmeter.save.saveservice.encoding=true
jmeter.save.saveservice.thread_counts=true
jmeter.save.saveservice.sample_count=true
jmeter.save.saveservice.bytes=true
jmeter.save.saveservice.sent_bytes=true
jmeter.save.saveservice.thread_name=true
jmeter.save.saveservice.idle_time=true

# HTML Report Generator Configuration
jmeter.reportgenerator.overall_granularity=1000
jmeter.reportgenerator.graph.responseTimePercentiles.property.set_granularity=1000
jmeter.reportgenerator.graph.responseTimePercentiles.property.set_granularity=1000

# APDEX Threshold (must be numeric, not variable)
jmeter.reportgenerator.apdex_satisfied_threshold=500
jmeter.reportgenerator.apdex_tolerated_threshold=1500
