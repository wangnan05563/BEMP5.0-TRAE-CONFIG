# SonarQube项目配置模板
# 此文件用于Sonar Scanner扫描代码时的项目配置

# 项目唯一标识
sonar.projectKey=bemp-ext-hnnxbank

# 项目名称（使用英文避免Windows环境下编码问题导致乱码）
sonar.projectName=BEMP Henan Rural Credit Personalized Extension

# 项目版本（由构建时动态传入）
sonar.projectVersion=${BUILD_NUMBER}

# 源代码路径（相对于项目根目录）
sonar.sources=.

# 源代码编码
sonar.sourceEncoding=UTF-8

# Java版本
sonar.java.source=1.8
sonar.java.target=1.8

# 编译输出路径（多模块项目需指定所有模块）
sonar.java.binaries=hnnxbank-biz-as/target/classes,hnnxbank-served-deploy/target/classes

# 排除的文件（不纳入扫描）
sonar.exclusions=**/target/**,**/test/**,**/*.xml,**/*.properties,**/*.yml,**/*.yaml

# 测试覆盖率排除
sonar.coverage.exclusions=**/test/**,**/*Test.java,**/*Tests.java

# 语言设置
sonar.language=java

# 质量门禁配置
sonar.qualitygate.wait=true

# SCM配置
sonar.scm.provider=git
sonar.scm.forceReloadAll=false

# 扫描日志级别
sonar.log.level=INFO
