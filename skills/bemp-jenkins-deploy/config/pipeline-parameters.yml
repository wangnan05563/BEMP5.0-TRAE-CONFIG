# Jenkins Pipeline 参数配置文件
# 版本: v5.0.0 (配置内联版)
# 说明: 本文件仅作为参数定义参考文档
#       实际运行时参数直接定义在 Jenkinsfile 的 parameters 块中

# ==================== 后端流水线参数 (Jenkinsfile-served) ====================

parameters:
  - name: "GIT_BRANCH"
    type: "string"
    default: "feature/hnnxbank/dev"
    description: "Git仓库目标分支"

  - name: "FORCE_OVERWRITE"
    type: "boolean"
    default: true
    description: "是否强制覆盖已存在的部署包"

  - name: "SKIP_SONAR"
    type: "boolean"
    default: true
    description: "是否跳过SonarQube代码扫描"

  - name: "SKIP_TESTS"
    type: "boolean"
    default: true
    description: "是否跳过单元测试"

  - name: "SKIP_CODE_PULL"
    type: "boolean"
    default: true
    description: "是否跳过代码拉取"

  - name: "SKIP_MAVEN_BUILD"
    type: "boolean"
    default: false
    description: "是否跳过Maven编译打包"

  - name: "SKIP_CONFIG_REPLACE"
    type: "boolean"
    default: true
    description: "是否跳过配置文件替换"

  - name: "SKIP_BACKUP"
    type: "boolean"
    default: false
    description: "是否跳过应用备份"

  - name: "SKIP_UPLOAD"
    type: "boolean"
    default: false
    description: "是否跳过部署包上传"

  - name: "SKIP_REDIS"
    type: "boolean"
    default: false
    description: "是否跳过Redis服务启动"

  - name: "SKIP_ZOOKEEPER"
    type: "boolean"
    default: false
    description: "是否跳过Zookeeper服务启动"

  - name: "SKIP_BEMP_SERVED"
    type: "boolean"
    default: false
    description: "是否跳过bemp-served服务启动"

  - name: "DEPLOY_ENVIRONMENT"
    type: "choice"
    choices:
      - "dev"
      - "test"
      - "staging"
      - "prod"
    default: "dev"
    description: "部署目标环境"

  - name: "NOTIFY_EMAIL"
    type: "string"
    default: "wangnan@hundsun.com"
    description: "构建通知邮箱"

  - name: "BUILD_THREADS"
    type: "string"
    default: "4"
    description: "Maven构建线程数"

# ==================== 前端流水线参数 (Jenkinsfile-frontend) ====================

frontend_parameters:
  - name: "GIT_BRANCH"
    type: "string"
    default: "feature/hnnxbank/dev"
    description: "Git仓库目标分支"

  - name: "FORCE_OVERWRITE"
    type: "boolean"
    default: true
    description: "是否强制覆盖已存在的部署包"

  - name: "SKIP_CODE_PULL"
    type: "boolean"
    default: true
    description: "是否跳过代码拉取"

  - name: "SKIP_NPM_BUILD"
    type: "boolean"
    default: false
    description: "是否跳过前端编译打包"

  - name: "SKIP_SONAR"
    type: "boolean"
    default: true
    description: "是否跳过SonarQube代码扫描"

  - name: "SKIP_BACKUP"
    type: "boolean"
    default: false
    description: "是否跳过应用备份"

  - name: "SKIP_UPLOAD"
    type: "boolean"
    default: false
    description: "是否跳过部署包上传"

  - name: "SKIP_NGINX"
    type: "boolean"
    default: false
    description: "是否跳过Nginx服务启动"

  - name: "DEPLOY_ENVIRONMENT"
    type: "choice"
    choices:
      - "dev"
      - "test"
      - "staging"
      - "prod"
    default: "dev"
    description: "部署目标环境"

  - name: "NOTIFY_EMAIL"
    type: "string"
    default: "wangnan@hundsun.com"
    description: "构建通知邮箱"
